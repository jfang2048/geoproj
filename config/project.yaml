project:
  name: lake_varese_monte_martica_post_fire_runoff
  crs_working: EPSG:32632
  study_area_label: Lake Varese / Monte Martica
  fire_year: 2019
  primary_model: simplified_event_scs_cn_runoff
  benchmark_model: user_exported_weppcloud
  scientific_scope: screening-level uncalibrated event runoff; no observed discharge calibration
reference_points:
  monte_martica_center_wgs84: {lon: 8.84, lat: 45.88}
  provisional_outlet_wgs84: {lon: 8.775, lat: 45.805}
inputs:
  # Assign these paths with the Data page upload controls or edit them manually.
  catchment_boundary:
  fire_perimeter:
  burn_severity:
  land_cover:
  hsg:
  rainfall_events:
  weppcloud_export:
processing:
  burn_raster_resolution_m: 30
landcover:
  column: landcover_class
  mappings: {}
soil:
  hsg_column: hsg
burn_classification:
  column: burn_class
  nodata: 255
  class_codes: {unburned: 0, low: 1, moderate: 2, high: 3}
runoff:
  initial_abstraction_ratio: 0.20
  antecedent_moisture: AMC-II
  hydrologic_condition_note: screening lookup table values; document local substitutions before case use
  burn_curve_number_adjustment: {0: 0, 1: 4, 2: 8, 3: 12}
  cn2_lookup:
    forest: {A: 30, B: 55, C: 70, D: 77}
    shrub: {A: 35, B: 56, C: 70, D: 77}
    grassland: {A: 39, B: 61, C: 74, D: 80}
    agriculture: {A: 67, B: 78, C: 85, D: 89}
    urban: {A: 77, B: 85, C: 90, D: 92}
    bare_soil: {A: 77, B: 86, C: 91, D: 94}
    water: {A: 98, B: 98, C: 98, D: 98}
    other: {A: 49, B: 69, C: 79, D: 84}
limitations:
  - Soil HSG must be supplied; there is no silent fallback.
  - A catchment boundary is required unless a reviewed delineation workflow is added.
  - WEPPcloud results are imported from user exports and are contextual only.
